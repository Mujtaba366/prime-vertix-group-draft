<header class="fixed top-0 left-0 right-0 z-50 transition-all duration-300 bg-white shadow-sm border-b border-slate-200/30">
    <nav class="max-w-7xl mx-auto px-6 lg:px-8 h-18 flex items-center justify-between py-4">
        <a
            href="#hero"
            class="flex items-center gap-3 group" >
            <div class="w-24 h-24 rounded-xl flex items-center justify-center">
                <img src="{{ url_for('static', filename='logo.png') }}" alt="Prime Vertex logo" class="w-20 h-20 object-contain rounded-lg"/>
            </div>
            <!--
            <div class="flex flex-col leading-none">
                <span class="font-display font-700 text-white text-sm tracking-wide">Prime Vertex</span>
                <span class="text-brand-400 text-xs font-medium tracking-widest uppercase">Group</span>
            </div>
            -->
        </a>
        <ul class="hidden md:flex items-center gap-8">
        {% for link in navLinks %}
            <li key="{{ link.href }}">
                <button
                    onClick="handleNav('{{ link.href }}')"
                    class="nav-link-underline text-gray-600 hover:text-brand-600 text-md font-medium transition-colors duration-200">
                    {{ link.label }}
                </button>
            </li>
        {% endfor %}
        </ul>
        <div class="hidden md:flex items-center gap-3">
            <button
                onClick="handleNav('#contact')"
                class="px-5 py-2.5 bg-brand-600 hover:bg-brand-500 text-white text-sm font-semibold rounded-lg transition-all 
                    duration-200 hover:shadow-lg hover:shadow-brand-500/30">
                    Get Started
            </button>
        </div>
        <button
            id="menuToggle"
            class="md:hidden text-slate-800 p-2 rounded-lg hover:bg-white/10 transition-colors"
            onclick="toggleMenu()"
            aria-label="Toggle menu">
            <svg class="menu-icon w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg class="close-icon hidden w-6 h-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </nav>
    <div id="mobileMenu" class="md:hidden transition-all duration-300 overflow-hidden max-h-0 opacity-0">
        <div class="bg-slate-950/98 backdrop-blur-md border-t border-white/5 px-6 py-4 flex flex-col gap-1">
            {% for link in navLinks %}
            <button
                key="{{ link.href }}"
                onclick="handleNav('{{ link.href }}')"
                class="text-left py-3 px-3 text-gray-800 hover:text-black hover:bg-white/5 rounded-lg text-sm font-medium transition-colors duration-200">
                {{ link.label }}
            </button>
            {% endfor %}
            <button
                onclick="handleNav('#contact')"
                class="mt-3 py-3 px-3 bg-brand-600 hover:bg-brand-500 text-white text-sm font-semibold rounded-lg transition-colors duration-200 text-center">
                Get Started
            </button>
        </div>
    </div>
</header>
